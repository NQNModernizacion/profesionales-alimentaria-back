name: profesionales-alimentaria

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: profesionales-alimentaria:latest
    command: ["sh", "-c", "pnpm db:migrate && pnpm db:seed:prod && node dist/main"]
    env_file:
      - .env.docker
    environment:
      API_BASE_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3000:3000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: profesionales_alimentaria
      POSTGRES_USER: profesionales_alimentaria_user
      POSTGRES_PASSWORD: profesionales_alimentaria_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U profesionales_alimentaria_user -d profesionales_alimentaria"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
